- name: Configuring backend server
  hosts: backend
  become: yes
  tasks:
  - name: disabling the current nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enabling the nodejs20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: Installing the nodejs
    ansible.builtin.package:
      name: "{{ item }}"
      state: present
    loop:
    - nodejs
    - mysql

  - name: Install mysql libraries
    ansible.builtin.pip:
      name: "{{ item }}"
      executable: pip3.9
    loop:
    - cryptography
    - PyMySQL

  - name: Create expense user
    ansible.builtin.user:
      name: expense
  
  - name: setting up the app directory
    ansible.builtin.file:
      path: /app
      state: directory
  
  - name: Download the backend code
    ansible.builtin.get_url:
      url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip
      dest: /tmp/backend.zip

  - name: unzipping the code
    ansible.builtin.unarchive:
      src: /tmp/backend.zip
      dest: /app
      remote_src: yes

  - name: installing the dependencies
    community.general.npm:
      path: /app

  - name: Copy file with owner and permissions
    ansible.builtin.copy:
      src: backend.service
      dest: /etc/systemd/system/backend.service

  - name: Create a new database with name 'bobdata'
    community.mysql.mysql_db:
      name: all
      state: import #import the schema
      login_user: root
      login_password: ExpenseApp@1
      login_host: mysql.rushhav.fun
      target: /app/schema/backend.sql